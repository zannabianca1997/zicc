[package]
name = "zicc"
version = "0.1.0"
edition = "2021"

[dependencies]
arrayvec = "0.7.2"
byteorder = "1.4.3"
ciborium = "0.2.0"
clap = { version = "4.2.1", features = ["derive"] }
either = { version = "1.8.1", features = ["serde"] }
enum-primitive-derive = "0.2.2"
itertools = "0.10.5"
lazy-regex = "2.5.0"
lazy_static = "1.4.0"
num-traits = "0.2.15"
pest = "2.5.7"
pest_derive = "2.5.7"
serde = { version = "1.0.159", features = ["derive"] }
serde_yaml = "0.9.19"
smartstring = { version = "1.0.1", features = ["serde"] }
strum = "0.24.1"
strum_macros = "0.24.3"
thiserror = "1.0.40"

[dev-dependencies]
rand = { version = "0.8.5", features = ["small_rng"] }
serde_yaml = "0.9.19"
