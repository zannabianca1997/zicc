cat:
  src: |
    in ch
    add ch #1 check
    loop: jz check:#0 #end
      out ch:#0
      in ch
    jz #0 #loop
    end:
  io:
    - inp: [1, 2, 3, 4, -1]
      out: [1, 2, 3, 4]
    - inp: [-1]
      out: []
"Double definition on same line":
  src: |
    a: a:
  parse_err: RedefinitedLabel
"Double definition on different lines":
  src: |
    a: 
    a:
  parse_err: RedefinitedLabel
